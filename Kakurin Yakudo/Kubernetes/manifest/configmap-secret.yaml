---
# ConfigMap - 구성 설정 데이터
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  labels:
    app: my-app
data:
  # 키-값 형태
  DATABASE_HOST: "postgres.default.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "mydb"
  LOG_LEVEL: "info"
  CACHE_ENABLED: "true"
  
  # 파일 형태
  nginx.conf: |
    server {
      listen 80;
      location / {
        proxy_pass http://backend:8080;
      }
    }
  
  app.properties: |
    app.name=MyApplication
    app.version=1.0.0
    server.port=8080

---
# Secret - 민감한 데이터 저장
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
  labels:
    app: my-app
type: Opaque
stringData:  # base64로 자동 인코딩
  DATABASE_USER: "admin"
  DATABASE_PASSWORD: "your-secure-password"
  API_KEY: "your-api-key-here"
  # JWT_SECRET: "your-jwt-secret"

---
# Secret - Docker 레지스트리 인증
apiVersion: v1
kind: Secret
metadata:
  name: docker-secret
  namespace: default
type: kubernetes.io/dockercfg
data:
  # docker login 후 ~/.docker/config.json에서 base64로 인코딩된 내용
  .dockercfg: eyJhdXRocyI6eyJkcm9rZXIuaW8iOnsidXNlcm5hbWUiOiJ1c2VybmFtZSIsInBhc3N3b3JkIjoicGFzc3dvcmQiLCJhdXRoIjoiYmFzZTY0ZW5jb2RlZCJ9fX0=

---
# Secret - TLS 인증서
apiVersion: v1
kind: Secret
metadata:
  name: app-tls
  namespace: default
type: kubernetes.io/tls
data:
  # tls.crt: base64로 인코딩된 인증서
  # tls.key: base64로 인코딩된 개인 키
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCkhlbGxvIFdvcmxkCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0=
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCkhlbGxvIFdvcmxkCi0tLS0tRU5EIFBSSVZBVEUgS0VZLS0tLS0=
